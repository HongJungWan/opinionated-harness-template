# ArchUnit DDD 게이트(CI 권위 게이트). 구조 규칙을 정밀 강제 — 훅(로컬 빠른 피드백)과 상호보완.
# branch protection 에서 이 잡을 required check 로 지정하면 머지가 차단된다.
name: DDD Gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hook-selftest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Harness 훅 자가 검증 (node, 의존성 0)
        run: ./scripts/verify-harness.sh

  archunit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: archunit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: gradle/actions/setup-gradle@v4
      - name: ArchUnit DDD 구조 규칙 (정밀)
        run: ./gradlew test --no-daemon
